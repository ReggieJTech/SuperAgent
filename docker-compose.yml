version: '3.8'

services:
  bigpanda-agent:
    image: reggiejtech/super-agent:latest
    container_name: bigpanda-agent
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}

    # Restart policy
    restart: unless-stopped

    # Ports
    ports:
      - "8443:8443"   # Web UI (HTTPS)
      - "162:162/udp" # SNMP traps
      - "8080:8080"   # Webhooks (optional)

    # Environment variables
    environment:
      - BP_TOKEN=${BP_TOKEN}
      - BP_APP_KEY=${BP_APP_KEY}
      - TZ=UTC

    # Volumes
    volumes:
      # Configuration
      - ./configs/default.yaml:/etc/bigpanda-agent/config.yaml:ro
      - ./configs/modules:/etc/bigpanda-agent/modules:ro
      - ./configs/event_configs:/etc/bigpanda-agent/snmp/event_configs:ro

      # Persistent data
      - agent-data:/var/lib/bigpanda-agent
      - agent-logs:/var/log/bigpanda-agent

      # Custom certificates (optional)
      # - ./certs:/etc/bigpanda-agent/certs:ro

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # Security
    cap_add:
      - NET_BIND_SERVICE  # For binding to port 162
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8443/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Networks
    networks:
      - bigpanda

# Volumes
volumes:
  agent-data:
    driver: local
  agent-logs:
    driver: local

# Networks
networks:
  bigpanda:
    driver: bridge
