---
# BigPanda Super Agent - Default Configuration

server:
  listen_address: "0.0.0.0:8443"
  tls:
    enabled: true
    cert_file: "/etc/bigpanda-agent/certs/server.crt"
    key_file: "/etc/bigpanda-agent/certs/server.key"
    # Auto-generate self-signed cert if files don't exist
    auto_generate: true

bigpanda:
  # BigPanda API endpoints - CONFIGURABLE per deployment
  api_url: "https://api.bigpanda.io/data/v2/alerts"
  stream_url: "https://api.bigpanda.io/data/v2/stream"
  heartbeat_url: "https://api.bigpanda.io/data/v2/heartbeat"

  # Alternative endpoints for on-premise or regional deployments
  # api_url: "https://api.eu.bigpanda.io/data/v2/alerts"
  # api_url: "https://bigpanda.internal.company.com/data/v2/alerts"

  # Authentication
  token: "${BP_TOKEN}"        # From environment or credentials file
  app_key: "${BP_APP_KEY}"    # From environment or credentials file

  # Batching configuration
  batching:
    enabled: true
    max_size: 100             # Max events per batch
    max_wait: 5s              # Max time to wait before sending batch
    max_bytes: 1048576        # Max batch size in bytes (1MB)

  # Retry configuration
  retry:
    max_attempts: 5
    initial_backoff: 1s
    max_backoff: 60s
    backoff_multiplier: 2.0

  # Rate limiting
  rate_limit:
    events_per_second: 1000
    burst: 2000

  # Timeout configuration
  timeout:
    connect: 10s
    request: 30s
    idle: 90s

queue:
  path: "/var/lib/bigpanda-agent/queue"
  max_size: 100000            # Max events in queue
  persistence: true
  sync_writes: false          # Set true for guaranteed durability (slower)

  # Dead letter queue configuration
  dlq:
    enabled: true
    max_size: 10000
    retention: 168h           # 7 days

monitoring:
  enabled: true
  heartbeat_interval: 60s
  self_monitoring: true

  # Metrics endpoint
  metrics:
    enabled: true
    listen_address: "0.0.0.0:9090"
    path: "/metrics"

  # Health check endpoints
  health:
    enabled: true
    path: "/health"

# Logging configuration
logging:
  level: "info"               # trace, debug, info, warn, error, fatal
  format: "json"              # json or console
  output: "/var/log/bigpanda-agent/agent.log"
  max_size: 100               # MB
  max_backups: 10
  max_age: 30                 # days
  compress: true

# Authentication configuration
auth:
  # Local user authentication (always available)
  local:
    enabled: true
    users_file: "/etc/bigpanda-agent/users.yaml"
    session_duration: 24h
    jwt_secret: "${JWT_SECRET}"  # Auto-generated if not set

  # LDAP authentication (optional)
  ldap:
    enabled: false
    server: "ldap://ldap.example.com:389"
    bind_dn: "cn=admin,dc=example,dc=com"
    bind_password: "${LDAP_PASSWORD}"
    user_search_base: "ou=users,dc=example,dc=com"
    user_search_filter: "(uid=%s)"
    group_search_base: "ou=groups,dc=example,dc=com"
    group_search_filter: "(memberUid=%s)"
    required_group: "bigpanda-users"

  # SSO/SAML authentication (optional)
  sso:
    enabled: false
    provider: "saml"
    entity_id: "bigpanda-agent"
    metadata_url: "https://sso.example.com/metadata"
    acs_url: "https://agent.example.com:8443/auth/saml/acs"
    certificate_file: "/etc/bigpanda-agent/certs/sso.crt"
    private_key_file: "/etc/bigpanda-agent/certs/sso.key"

# Module configuration
modules:
  - name: snmp
    enabled: true
    config_file: "/etc/bigpanda-agent/modules/snmp.yaml"

  - name: webhook
    enabled: false
    config_file: "/etc/bigpanda-agent/modules/webhook.yaml"

  - name: automation
    enabled: false
    config_file: "/etc/bigpanda-agent/modules/automation.yaml"

# Security settings
security:
  # Credential encryption (using age encryption)
  encryption:
    enabled: true
    key_file: "/etc/bigpanda-agent/encryption.key"

  # TLS certificate management
  tls:
    min_version: "1.2"        # 1.0, 1.1, 1.2, 1.3
    cipher_suites:
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

  # API rate limiting
  api_rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20
