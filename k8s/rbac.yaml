apiVersion: v1
kind: ServiceAccount
metadata:
  name: bigpanda-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bigpanda-agent
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bigpanda-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bigpanda-agent
subjects:
- kind: ServiceAccount
  name: bigpanda-agent
